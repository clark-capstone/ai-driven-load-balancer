# ===============================
# Application Info
# ===============================
spring.application.name=alb-core-service

# ===============================
# Server Configuration
# ===============================
server.port=8080

# Unique node ID (VERY IMPORTANT for multi-node setup)
server.node.id=local-node

# ===============================
# Logging Configuration
# ===============================
logging.level.org.springframework.web=INFO
logging.level.com.capstone.alb=DEBUG

# Show more details for debugging routing decisions
logging.level.com.capstone.alb.service=DEBUG
logging.level.com.capstone.alb.strategy=DEBUG

# ===============================
# Actuator (Optional but Recommended)
# ===============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ===============================
# Timeout Configuration (for remote calls)
# ===============================
# (Useful when calling ngrok URLs)
spring.mvc.async.request-timeout=5000

# ===============================
# CORS (Temporary for testing - ngrok)
# ===============================
# You can remove later in production
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST
spring.web.cors.allowed-headers=*

server.address=127.0.0.1